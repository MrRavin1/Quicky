services:
  - type: web
    name: quicky
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Quicky
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: quicky
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: quicky-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: quicky-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: quicky-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: quicky-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quicky-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

databases:
  - name: quicky-db
    plan: free
    databaseName: quicky
    user: quicky
